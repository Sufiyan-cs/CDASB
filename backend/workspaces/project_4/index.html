<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kanban Board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="ambient-glow"></div>
  <header class="app-header">
    <div class="header-content">
      <h1 class="app-title">Kanban</h1>
      <button class="add-task-btn" id="open-modal-btn" type="button">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        <span>Add Task</span>
      </button>
    </div>
  </header>
  <main class="kanban-board">
    <div class="column" id="to-do">
      <div class="column-header">
        <h2>To Do</h2>
        <span class="task-count">0</span>
      </div>
      <div class="task-list"></div>
    </div>
    <div class="column" id="in-progress">
      <div class="column-header">
        <h2>In Progress</h2>
        <span class="task-count">0</span>
      </div>
      <div class="task-list"></div>
    </div>
    <div class="column" id="done">
      <div class="column-header">
        <h2>Done</h2>
        <span class="task-count">0</span>
      </div>
      <div class="task-list"></div>
    </div>
  </main>
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="add-task-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-header">
        <h3 id="modal-title">New Task</h3>
        <button class="modal-close" id="close-modal-btn" type="button" aria-label="Close modal">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <form id="task-form">
        <div class="form-group">
          <label for="task-title">Task Title</label>
          <input type="text" id="task-title" placeholder="Task title" required autocomplete="off">
        </div>
        <div class="form-group">
          <label for="task-priority">Priority</label>
          <div class="select-wrapper">
            <select id="task-priority" required>
              <option value="high">High</option>
              <option value="medium" selected>Medium</option>
              <option value="low">Low</option>
            </select>
            <svg class="select-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
          </div>
        </div>
        <button type="submit">Add Task</button>
      </form>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
