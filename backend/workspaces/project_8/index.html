<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A premium todo list application with dark/light theme toggle">
    <title>Todo List</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="dark-theme.css">
  <link rel="stylesheet" href="light-theme.css">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <h1 class="site-title">Todo List</h1>
            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme" type="button">
                <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
                <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
        </div>
    </header>
    <main class="main">
        <div class="todo-container">
            <ul id="todo-list" class="todo-list" role="list" aria-label="Todo items"></ul>
            <div class="todo-input-group">
                <input id="todo-input" type="text" placeholder="Add new todo" class="todo-input" autocomplete="off" aria-label="New todo item">
                <button id="add-todo" class="add-todo-btn" type="button" aria-label="Add todo">Add</button>
            </div>
        </div>
    </main>
    <footer class="footer">
        <p class="copyright">&copy; 2025 Todo List. All rights reserved.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
