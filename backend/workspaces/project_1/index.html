<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower of Hanoi</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="game-container">
        <h1 class="game-title">Tower of Hanoi</h1>
        <p class="game-instructions">Click a disk to select it, then click a tower to move it there.</p>
        <div class="towers-wrapper">
            <div class="tower" id="tower-1" data-tower="0">
                <!-- JS generates children here -->
            </div>
            <div class="tower" id="tower-2" data-tower="1">
                <!-- JS generates children here -->
            </div>
            <div class="tower" id="tower-3" data-tower="2">
                <!-- JS generates children here -->
            </div>
        </div>
        <div class="game-info">
            <p id="move-counter">Moves: 0</p>
        </div>
        <button id="reset-button">Reset Game</button>
    </div>
    <script src="TowerOfHanoi.js"></script>
    <script src="app.js"></script>
</body>
</html>
